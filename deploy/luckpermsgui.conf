# Example nginx server block for luckpermsgui.muffdev.xyz
#
# This is a guess at your setup, not a copy of it — I don't have access to your server or its
# existing config, so I don't actually know whether you're running nginx, Apache, Caddy, or
# something else. Adapt (or ignore) this to match whatever your other sites under /var/www
# already use. Drop the "luckpermsgui.muffdev.xyz" folder itself into /var/www/ so the paths
# below line up, then symlink or copy this into your nginx sites-available/sites-enabled
# (commonly /etc/nginx/sites-available/luckpermsgui.muffdev.xyz).
#
# This file is deliberately kept outside the webroot folder (luckpermsgui.muffdev.xyz/) so it
# never gets uploaded into the publicly served directory alongside index.html.

server {
    listen 80;
    listen [::]:80;
    server_name luckpermsgui.muffdev.xyz;

    root /var/www/luckpermsgui;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        log_not_found off;
    }
}

# After DNS for luckpermsgui.muffdev.xyz points at this server, and this block is enabled and
# nginx reloaded (nginx -t && systemctl reload nginx), the usual next step for HTTPS on a setup
# like this is:
#
#   sudo certbot --nginx -d luckpermsgui.muffdev.xyz
#
# which rewrites this file to add the TLS listener and redirect - safe to run again if you
# already use certbot for your other domains on this box.
